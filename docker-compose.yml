version: "3"
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8080:8080"
    env_file:
      - .env
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    ports:
      - "5173:5173"
    working_dir: /app
    command: npm run dev
    volumes:
      - ./frontend:/app
      # これないとvite見つからんってエラる
      - /app/node_modules 